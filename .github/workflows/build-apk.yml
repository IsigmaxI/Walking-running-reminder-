name: Build Android APK From Zip

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10'

      - name: Unzip Android project
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip -q "$ZIP_FILE" -d extracted
          PROJECT_DIR=$(find extracted -name settings.gradle -printf '%h\n' | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Build APK
        run: gradle -p "$PROJECT_DIR" assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RunWalkReminder-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
